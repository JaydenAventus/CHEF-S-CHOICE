<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team — Chef's Choice</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }
    .team-member {
      text-align: center;
      border: 1px solid #eee;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1rem;
    }
    .team-member img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: block;
    }
    .team-member h3 {
      color: var(--brand);
      margin: 0.5rem 0;
    }
    .team-member p {
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">🍽️ Chef's Choice</a>
      <nav class="main-nav">
        <a href="recepten.html">Recepten</a>
        <a href="lessen.html">Lessen</a>
        <a href="team.html">Team</a>
        <a href="aanmelden.html" class="btn">Aanmelden</a>
        <a href="inloggen.html">Inloggen</a>
      </nav>
      <button class="nav-toggle" aria-label="Navigatie in-/uitschakelen">☰</button>
    </div>
  </header>
  <main class="container">
    <h1>Ontmoet ons Team</h1>
    <section class="team-grid">
      <div class="team-member">
        <img src="LONL8794.JPG?w=400&h=300&fit=crop" alt="Chef Jayden">
        <h3>Chef Jayden</h3>
        <p>Hoofdchef — Nederlandse keukenspecialist</p>
      </div>
      <div class="team-member">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=300&fit=crop" alt="Chef Jason">
        <h3>Chef Jason</h3>
        <p>Sous Chef — Gebak en desserts</p>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container">© Chef's Choice</div>
  </footer>
  <script src="scripts.js"></script>
</body>
</html>
